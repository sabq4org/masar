<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>مسار — من الفكرة إلى النشر</title>
    <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg" />
    <link rel="apple-touch-icon" href="/brand/app-icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // تفعيل الثيم واللغة قبل الرسم الأول لتجنب الوميض
      try {
        var theme = localStorage.getItem("masar-theme");
        if (theme === "night" || theme === "dawn")
          document.documentElement.dataset.theme = theme;
        var lang = localStorage.getItem("masar-lang");
        if (lang === "en") {
          document.documentElement.lang = "en";
          document.documentElement.dir = "ltr";
          document.title = "Masar — From idea to delivery";
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
